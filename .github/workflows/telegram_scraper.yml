name: telegram_scraper

on:
  workflow_dispatch:
  push:
    paths:
      - 'telegram_scraper.py'
      - '.github/workflows/telegram_scraper.yml'
  schedule:
    - cron: '0 0,4,8,12,16 * * *'

jobs:
  run_scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write # 必须赋予写入 Issue 的权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libsm6 libxext6 libxrender1
          pip install requests beautifulsoup4 easyocr torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run Scraper
        run: python telegram_scraper.py

      - name: Manage GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 获取当前北京时间作为标题
          REPORT_TITLE="📢 财经汇总报告 $(date -d '8 hours' +'%Y-%m-%d %H:%M')"
          
          # 2. 关闭带有 'daily-report' 标签的所有旧 Issue，防止堆积
          gh issue list --label "daily-report" --json number --jq '.[].number' | xargs -I {} gh issue close {}
          
          # 3. 创建新的 Issue，并打上 'daily-report' 标签
          # 如果标签不存在，gh 命令会自动创建它
          gh issue create --title "$REPORT_TITLE" --body-file issue_body.md --label "daily-report"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Bot"
          git add README.md history/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update $(date -d '8 hours' +'%Y-%m-%d %H:%M')" && git push)
